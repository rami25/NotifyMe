<ion-content fullscreen class="al-login-content">
  <div class="al-login-wrap">
    <div class="al-login-brand">
      <img src="assets/icon/logo.png" alt="Air Liquide" />
    </div>

    <div class="al-login-copy">
      <h1>Field Actions</h1>
      <p>Sign in with your Air Liquide account to see the actions assigned to you.</p>
    </div>

    <button
      class="al-google-btn"
      type="button"
      [disabled]="submitting()"
      (click)="signIn()">
      @if (submitting()) {
        <ion-spinner name="crescent"></ion-spinner>
        <span>Signing in…</span>
      } @else {
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.9 32.9 29.4 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.5 5.5 29.6 3.5 24 3.5 12.8 3.5 3.5 12.8 3.5 24S12.8 44.5 24 44.5 44.5 35.2 44.5 24c0-1.2-.1-2.4-.3-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.6 18.9 12.5 24 12.5c3.1 0 5.8 1.1 8 3l6-6C34.5 5.5 29.6 3.5 24 3.5c-7.8 0-14.5 4.4-17.7 11.2z"/>
          <path fill="#4CAF50" d="M24 44.5c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4c-2 1.4-4.6 2.2-7.6 2.2-5.4 0-9.9-3.1-11.5-7.6l-6.6 5.1C9.4 40 16.1 44.5 24 44.5z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.9 2.6-2.6 4.8-4.9 6.3l6.6 5.4C40.9 36.9 44.5 30.9 44.5 24c0-1.2-.1-2.4-.3-3.5z"/>
        </svg>
        <span>Sign in with Google</span>
      }
    </button>

    @if (errorMessage()) {
      <p class="al-login-error">{{ errorMessage() }}</p>
    }

    <!-- <p class="al-login-footnote">Restricted to @airliquide.com accounts</p> -->
    <p class="al-login-footnote">Restricted to airliquide.com accounts</p>
  </div>
</ion-content>
